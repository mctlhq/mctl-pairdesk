name: Claude PR review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions: {}

jobs:
  review:
    # Skip drafts and fork PRs: CLAUDE_CODE_OAUTH_TOKEN is not available to
    # forks, so the step would fail with a secret-not-found error. (Once the
    # repo is public, fork PRs are possible.) synchronize re-reviews after each
    # fix-up push and dismisses stale approvals under branch protection.
    if: >
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Classify PR complexity and pick model
        id: classify
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR=${{ github.event.pull_request.number || github.event.issue.number }}
          files=$(gh pr view "$PR" --repo ${{ github.repository }} \
            --json files --jq '[.files[].path] | join("\n")')
          lines=$(gh pr diff "$PR" --repo ${{ github.repository }} 2>/dev/null \
            | grep -c '^[+-][^+-]' || echo 0)
          score=1
          while IFS= read -r f; do
            # Auth / money / concurrency-sensitive backend → top tier.
            if echo "$f" | grep -qE '^src/(services|routes|db|middleware|telegram)/'; then
              score=3; break
            # Any other non-test TypeScript → mid tier.
            elif echo "$f" | grep -qE '\.ts$' && ! echo "$f" | grep -qE '\.(test|spec)\.ts$'; then
              [ $score -lt 2 ] && score=2
            fi
          done <<< "$files"
          if [ "$lines" -gt 400 ] && [ $score -lt 3 ]; then
            score=$((score + 1))
          fi
          case $score in
            3) model="claude-opus-4-7" ;;
            2) model="claude-sonnet-4-6" ;;
            *) model="claude-haiku-4-5-20251001" ;;
          esac
          echo "model=$model" >> $GITHUB_OUTPUT
          echo "score=$score" >> $GITHUB_OUTPUT
          echo "lines=$lines" >> $GITHUB_OUTPUT
          echo "PR #$PR: model=$model score=$score lines=$lines"

      - name: Check fallback token availability
        id: token-check
        run: |
          if [ -n "$TOKEN2" ]; then
            echo "has_fallback=true" >> $GITHUB_OUTPUT
          else
            echo "has_fallback=false" >> $GITHUB_OUTPUT
          fi
        env:
          TOKEN2: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_2 }}

      - name: Claude review
        id: review
        continue-on-error: true
        uses: anthropics/claude-code-action@51ea8ea73a139f2a74ff649e3092c25a904aed7e # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are the automated code reviewer for this pull request. Review
            the PR diff thoroughly.

            PairDesk is a CLOSED P2P exchange-request board (a bulletin board,
            NOT an exchange): no custody, no payments, no escrow. Focus on:
            - Correctness and logic errors; edge cases the change misses.
            - Concurrency: the order-reservation accept flow MUST stay race-safe
              — accept locks the order (FOR NO KEY UPDATE) and only one deal may
              win (partial unique index uq_deals_winner); watch for missing row
              locks, lost updates, double-win, and sweeper/accept races.
            - Sensitive-data leakage: phone / contact / payment-account fields
              must NEVER appear in a public order serializer or order-book
              payload. Contact details may only be returned by the deal
              serializer to the creator or chosen responder when the deal is
              accepted/completed AND the order is reserved/completed.
            - Security: SQL injection, authn/authz, RBAC gates (requireApproved /
              requireRole), Telegram initData validation, secret handling.
            - Closed-access integrity: pending/blocked users must not reach
              approved-only routes; community_id scoping must not be bypassable.
            - Error handling: ignored promise rejections, missing await,
              swallowed errors, unhandled paths.
            - Test coverage: behaviour changed without a corresponding test.

            Follow the conventions in this repository's CLAUDE.md (TypeScript /
            Node style, conventional commits, English only, no emoji).

            If the diff is trivial — only config/values YAML (hostname, env
            var, image tag, resource limits, replica count), a dependency bump
            with no logic change, docs/comments, or a one-line typo — approve
            the PR with a one-line reason and nothing else:
            `gh pr review ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --approve --body "<reason>"`.

            Otherwise, post each finding as an inline comment using the
            mcp__github_inline_comment__create_inline_comment tool, prefixed
            with a severity tag:
            - P1 — must fix before merge (bug, security hole, data loss).
            - P2 — should fix before merge (likely bug, missing test, unsafe
              pattern).
            - P3 — nice to have (style, minor nit); does not block merge.

            Finish by submitting a single PR review verdict (this is the merge
            gate — `main` requires one approving review, and pr-steward will
            only auto-merge a feat/agents-* PR once an approving review exists
            at the current head SHA). Include the P1/P2/P3 counts in the body;
            be concise and do not restate the diff:
            - No P1/P2 findings (P3 nits are fine): approve —
              `gh pr review ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --approve --body "No P1/P2 findings (<n> P3). Good to merge."`
            - One or more P1/P2 findings: request changes —
              `gh pr review ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --request-changes --body "Has P1/P2 findings, changes requested: <summary>"`
          claude_args: '--model ${{ steps.classify.outputs.model }} --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr review:*),Bash(gh pr diff:*),Bash(gh pr view:*)"'

      - name: Claude review (fallback token)
        if: steps.review.outcome == 'failure' && steps.token-check.outputs.has_fallback == 'true'
        uses: anthropics/claude-code-action@51ea8ea73a139f2a74ff649e3092c25a904aed7e # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_2 }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are the automated code reviewer for this pull request. Review
            the PR diff thoroughly.

            PairDesk is a CLOSED P2P exchange-request board (a bulletin board,
            NOT an exchange): no custody, no payments, no escrow. Focus on:
            - Correctness and logic errors; edge cases the change misses.
            - Concurrency: the order-reservation accept flow MUST stay race-safe
              — accept locks the order (FOR NO KEY UPDATE) and only one deal may
              win (partial unique index uq_deals_winner); watch for missing row
              locks, lost updates, double-win, and sweeper/accept races.
            - Sensitive-data leakage: phone / contact / payment-account fields
              must NEVER appear in a public order serializer or order-book
              payload. Contact details may only be returned by the deal
              serializer to the creator or chosen responder when the deal is
              accepted/completed AND the order is reserved/completed.
            - Security: SQL injection, authn/authz, RBAC gates (requireApproved /
              requireRole), Telegram initData validation, secret handling.
            - Closed-access integrity: pending/blocked users must not reach
              approved-only routes; community_id scoping must not be bypassable.
            - Error handling: ignored promise rejections, missing await,
              swallowed errors, unhandled paths.
            - Test coverage: behaviour changed without a corresponding test.

            Follow the conventions in this repository's CLAUDE.md (TypeScript /
            Node style, conventional commits, English only, no emoji).

            If the diff is trivial — only config/values YAML (hostname, env
            var, image tag, resource limits, replica count), a dependency bump
            with no logic change, docs/comments, or a one-line typo — approve
            the PR with a one-line reason and nothing else:
            `gh pr review ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --approve --body "<reason>"`.

            Otherwise, post each finding as an inline comment using the
            mcp__github_inline_comment__create_inline_comment tool, prefixed
            with a severity tag:
            - P1 — must fix before merge (bug, security hole, data loss).
            - P2 — should fix before merge (likely bug, missing test, unsafe
              pattern).
            - P3 — nice to have (style, minor nit); does not block merge.

            Finish by submitting a single PR review verdict (this is the merge
            gate — `main` requires one approving review, and pr-steward will
            only auto-merge a feat/agents-* PR once an approving review exists
            at the current head SHA). Include the P1/P2/P3 counts in the body;
            be concise and do not restate the diff:
            - No P1/P2 findings (P3 nits are fine): approve —
              `gh pr review ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --approve --body "No P1/P2 findings (<n> P3). Good to merge."`
            - One or more P1/P2 findings: request changes —
              `gh pr review ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --request-changes --body "Has P1/P2 findings, changes requested: <summary>"`
          claude_args: '--model ${{ steps.classify.outputs.model }} --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr review:*),Bash(gh pr diff:*),Bash(gh pr view:*)"'
