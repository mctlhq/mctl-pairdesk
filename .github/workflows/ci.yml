name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    name: backend build & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run type-check
      # build:api only — the React Mini App (web/) is added in Stage 3, at which
      # point a web job + the full `npm run build` are wired here.
      - run: npm run build:api

  docker:
    name: docker image build (PR gate)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: false
          tags: mctl-pairdesk:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
