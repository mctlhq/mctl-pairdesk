name: e2e

# Runs the Playwright Mini App harness (signed-initData fixture + stubbed WebApp SDK)
# and the sweeper integration test against a clean Postgres on every PR. No secrets:
# a throwaway token both signs the fixture initData and boots the test server, so the
# genuine initData HMAC path is exercised.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pairdesk
          POSTGRES_PASSWORD: pairdesk
          POSTGRES_DB: pairdesk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pairdesk -d pairdesk_test"
          --health-interval 5s --health-timeout 5s --health-retries 12
    env:
      # In CI the Postgres `services` container is already clean per job, so we skip
      # scripts/test-db.sh and point the harness straight at it.
      DATABASE_URL: postgres://pairdesk:pairdesk@localhost:5432/pairdesk_test
      DATABASE_SSL: "false"
      PAIRDESK_TEST_BOT_TOKEN: test:HARNESS
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Build API
        run: npm run build:api
      - name: Sweeper integration test
        run: node --test tests/integration/expiry.test.mjs
      - name: E2E smoke (Playwright boots web + API)
        run: npx playwright test
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
